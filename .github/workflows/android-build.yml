name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # 允许工作流把错误报告提交回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

      # 构建失败时：把编译错误提取出来，推到独立的 ci-logs 分支（不污染 main）
      - name: Publish build errors on failure
        if: steps.build.outcome != 'success'
        run: |
          {
            echo "# Build failed - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "commit: ${{ github.sha }}"
            echo
            echo "## Kotlin / Gradle errors (grep)"
            echo '```'
            grep -nE "^(e: |w: |FAILURE:|> Task .*FAILED|Caused by:|.*: error:|.*\.kt:[0-9]+)" build.log || echo "(no matching error lines)"
            echo '```'
            echo
            echo "## Last 150 lines of build log"
            echo '```'
            tail -n 150 build.log
            echo '```'
          } > /tmp/ci-build-errors.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 用孤立分支，只放这一个文件，强制推送，绝不影响 main
          git checkout --orphan ci-logs
          git rm -rf --cached . >/dev/null 2>&1 || true
          cp /tmp/ci-build-errors.txt ci-build-errors.txt
          git add ci-build-errors.txt
          git commit -m "ci: build error report" || echo "no changes"
          git push -f origin ci-logs || true

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: PRRCN-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Fail job if build failed
        if: steps.build.outcome != 'success'
        run: exit 1
